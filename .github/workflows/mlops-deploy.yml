name: MLOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run tests
        run: pytest -q

  build_and_push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend image
        run: |
          REGION=${{ secrets.AWS_REGION }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REPOSITORY_NAME=mlops-assistant-backend
          IMAGE_TAG=${{ github.sha }}
          aws ecr create-repository --repository-name $REPOSITORY_NAME --region $REGION || true
          docker build -f Dockerfile.backend -t $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/$REPOSITORY_NAME:$IMAGE_TAG .
          docker push $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/$REPOSITORY_NAME:$IMAGE_TAG
      - name: Build and push frontend image
        run: |
          REGION=${{ secrets.AWS_REGION }}
          ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
          REPOSITORY_NAME=mlops-assistant-frontend
          IMAGE_TAG=${{ github.sha }}
          aws ecr create-repository --repository-name $REPOSITORY_NAME --region $REGION || true
          docker build -f Dockerfile.frontend -t $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/$REPOSITORY_NAME:$IMAGE_TAG .
          docker push $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/$REPOSITORY_NAME:$IMAGE_TAG

  deploy_ec2:
    needs: build_and_push
    runs-on: ubuntu-latest
    steps:
      - name: SSH deploy to EC2
        uses: appleboy/ssh-action@v0.1.9
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            REGION=${{ secrets.AWS_REGION }}
            ACCOUNT=${{ secrets.AWS_ACCOUNT_ID }}
            BACKEND_TAG=${{ github.sha }}
            FRONTEND_TAG=${{ github.sha }}
            docker pull $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/mlops-assistant-backend:$BACKEND_TAG
            docker pull $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/mlops-assistant-frontend:$FRONTEND_TAG
            docker stop rohit_backend || true
            docker stop rohit_frontend || true
            docker rm rohit_backend || true
            docker rm rohit_frontend || true
            docker run -d --name rohit_backend -p 8030:8030 $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/mlops-assistant-backend:$BACKEND_TAG
            docker run -d --name rohit_frontend -p 8601:8601 --link rohit_backend $ACCOUNT.dkr.ecr.$REGION.amazonaws.com/mlops-assistant-frontend:$FRONTEND_TAG
